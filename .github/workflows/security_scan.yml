name: API Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name:  Checkout code
      uses: actions/checkout@v4

    - name:  Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name:  Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🔹 ИСПРАВЛЕНО: docker compose (V2) вместо docker-compose
    - name:  Start crAPI Environment
      run: |
        echo " Клонируем репозиторий crAPI..."
        git clone --depth 1 https://github.com/OWASP/crAPI.git
        
        echo " Запускаем crAPI через Docker Compose V2..."
        cd crAPI/deploy/docker
        
        #  Используем "docker compose" (V2) вместо "docker-compose"
        docker compose up -d
        
        echo " Ожидаем запуск сервисов (90-120 сек)..."
        sleep 120
        
        echo " Проверяем доступность API..."
        curl -f http://localhost:8888/identity/api/v2/user/dashboard || echo " API check failed, continuing anyway..."

    - name:  Run Security Scanner
      id: scan
      run: |
        echo " Запуск сканирования безопасности API..."
        python src/api_sec/cli.py scan \
          --config config-crapi.yaml \
          --profile full
      continue-on-error: true

    # 🔹 Пути к отчётам (используем reports*, так как в коде отчёты пишутся в reports-crapi/)
    - name:  Upload HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report-html
        path: reports*/**/*.html
        retention-days: 30

    - name:  Upload JSON Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report-json
        path: reports*/**/*.json
        retention-days: 30

    - name:  Security Summary
      if: always()
      run: |
        echo "##  Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Scanner completed**" >> $GITHUB_STEP_SUMMARY
        echo "-  Фреймворк интегрирован в CI/CD" >> $GITHUB_STEP_SUMMARY
        echo "-  Отчёты доступны в разделе **Artifacts**" >> $GITHUB_STEP_SUMMARY
        echo "-  Тестирование выполнено на crAPI (OWASP)" >> $GITHUB_STEP_SUMMARY
