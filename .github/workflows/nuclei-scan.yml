name: CRAPI Security Scan with Nuclei (OpenAPI + DAST)

on:
  push:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start crAPI
        run: |
          docker compose -f docker-compose.yml --compatibility up -d
          
      - name: Wait for crAPI to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8888/health > /dev/null; then
              echo "crAPI is ready!"
              exit 0
            fi
            echo "Waiting for crAPI... ($i/30)"
            sleep 5
          done
          echo "crAPI did not become ready in time"
          exit 1

      - name: Register test user
        id: register
        run: |
          curl -X POST http://localhost:8888/identity/api/auth/signup \
            -H "Content-Type: application/json" \
            -d '{"email": "ci-test@example.com", "password": "CITest123!"}' || true
          
      - name: Get authentication token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8888/identity/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email": "ci-test@example.com", "password": "CITest123!"}')
          TOKEN=$(echo $RESPONSE | jq -r '.token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token obtained successfully"

      - name: Download OpenAPI specification
        run: |
          curl -L -o openapi.json https://raw.githubusercontent.com/OWASP/crAPI/main/docs/openapi.json
          echo "OpenAPI spec downloaded, size: $(wc -c < openapi.json) bytes"
          if ! jq empty openapi.json 2>/dev/null; then
            echo "ERROR: Downloaded file is not valid JSON"
            cat openapi.json
            exit 1
          fi
          echo "OpenAPI spec is valid JSON"

      # ИСПРАВЛЕНО: Устанавливаем Nuclei вручную, минуя action
      - name: Install Nuclei
        run: |
          curl -s https://raw.githubusercontent.com/projectdiscovery/nuclei/master/install.sh | bash
          sudo mv nuclei /usr/local/bin/
          nuclei -version
          
      # ИСПРАВЛЕНО: Загружаем шаблоны отдельно (с retry)
      - name: Download Nuclei templates
        run: |
          # Создаем директорию для шаблонов
          mkdir -p ~/nuclei-templates
          # Клонируем шаблоны с retry и shallow clone
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git ~/nuclei-templates || \
          git clone --depth 1 https://gitclone.com/github.com/projectdiscovery/nuclei-templates.git ~/nuclei-templates
          echo "Templates downloaded to ~/nuclei-templates"

      # ИСПРАВЛЕНО: Запускаем Nuclei напрямую
      - name: Run Nuclei DAST scan
        run: |
          nuclei -l openapi.json \
            -im openapi \
            -dast \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -severity high,critical \
            -include-rr \
            -j \
            -stats \
            -si 15 \
            -timeout 300 \
            -t ~/nuclei-templates/ \
            -o nuclei-report.json
        continue-on-error: true

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-dast-report
          path: nuclei-report.json
          if-no-files-found: warn

      - name: Stop crAPI
        if: always()
        run: |
          docker compose -f docker-compose.yml down
